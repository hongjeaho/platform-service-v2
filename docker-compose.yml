services:
  mysql:
    image: mysql:8.0.45
    container_name: platform-mysql-v2
    platform: linux/amd64
    command:
      - --skip-ssl
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: store
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    networks:
      - storenet
    restart: unless-stopped
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d
      - ./docker/mysql/logs:/var/log/mysql

  redis:
    image: redis:7.4-alpine
    container_name: platform-redis-v2
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - storenet
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:

networks:
  storenet:
    driver: bridge